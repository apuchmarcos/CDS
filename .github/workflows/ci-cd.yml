# ============================================================================
# CI/CD Workflow
# ============================================================================
# This unified workflow handles both continuous integration and releases.
#
# Triggers:
#   - Push/PR to main → Run tests, build, lint (no release)
#   - Version tag push → Run tests, build, lint + create GitHub Release
#
# Jobs:
#   1. Build & Test - Builds binaries, runs tests with coverage
#   2. Lint - Runs golangci-lint (parallel with build)
#   3. Release - Creates multi-platform release (only on tags)
#
# Version Configuration: Update the env section below
# ============================================================================

name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

# Default permissions are read-only (least privilege principle)
permissions:
  contents: read

env:
  # ========================================
  # VERSION CONFIGURATION - EDIT HERE
  # ========================================
  GO_VERSION: "1.23"
  PROTOC_VERSION: "28.3"

jobs:
  # ========================================
  # Build and Test
  # ========================================
  build-and-test:
    name: Build and Test with Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for posting comments on PRs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Go with caching
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Install Protocol Buffers compiler
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      # Install Go dependencies
      - name: Install Go dependencies
        run: |
          go install github.com/cloudflare/cfssl/cmd/cfssl@latest
          go install github.com/cloudflare/cfssl/cmd/cfssljson@latest

      # Build using makefile (handles init, gencert, go-tidy, build-pb, build binaries)
      - name: Build project
        run: make ci-build

      # Run tests and generate coverage report
      - name: Run tests with coverage
        run: make gen-coverage

      # Generate coverage summary and extract total percentage
      - name: Generate coverage summary
        id: coverage
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tee coverage-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Extract total coverage percentage for the comment
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # Publish coverage report as PR comment
      - name: Publish coverage comment on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE: ${{ steps.coverage.outputs.total }}
        run: |
          # Create comment body using heredoc
          cat << 'EOF' > comment.md
          ## 📊 Coverage Report

          **Total Coverage:** `${{ steps.coverage.outputs.total }}`

          <details>
          <summary>📋 Coverage Details</summary>

          ```
          EOF
          cat coverage-summary.txt >> comment.md
          cat << 'EOF' >> comment.md
          ```

          </details>

          ---
          *Generated by CI workflow*
          EOF
          
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md

      # Upload binaries as artifacts (for all runs)
      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cds-binaries-${{ github.sha }}
          path: |
            cds-api-agent
            cds
          retention-days: 7

  # ========================================
  # Lint
  # ========================================
  # Run linting in parallel with build-and-test
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Go with caching
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Install Protocol Buffers compiler (required by makefile check)
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}

      # Tidy Go module dependencies
      - name: Go mod tidy
        run: make go-tidy

      # Install golangci-lint tool
      - name: Install golangci-lint
        run: make install-golangci-lint

      # Run linting checks
      - name: Run lint
        run: make lint

  # ========================================
  # Release (Only on Tags)
  # ========================================
  release:
    name: Build and Publish GitHub Release
    # Only run on version tag pushes AND after build/test passes
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git describe to get version from tags

      # Setup Go with caching
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Build release binaries for all platforms with checksums
      - name: Build release binaries
        run: make delivery-checksums

      # Extract version from the git tag
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Create the GitHub release with all artifacts
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.VERSION }} \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            tarball-deliv/*.tar.gz \
            tarball-deliv/*.zip \
            tarball-deliv/checksums.sha256

      # Add summary to workflow run
      - name: Release Summary
        run: |
          echo "## 🚀 Release ${{ steps.version.outputs.VERSION }} Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release Artifacts:" >> $GITHUB_STEP_SUMMARY
          ls -la tarball-deliv/*.tar.gz tarball-deliv/*.zip 2>/dev/null | awk '{print "- `" $NF "`"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Checksums:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat tarball-deliv/checksums.sha256 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ All tests passed and builds verified" >> $GITHUB_STEP_SUMMARY
