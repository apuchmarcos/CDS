name: Feature request
description: Suggest an idea or enhancement for CDS
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose an improvement.

        Please **do not** include secrets (tokens, passwords, private keys, certificates).

  - type: dropdown
    id: component
    attributes:
      label: Area / component
      options:
        - CLI (cds)
        - API Agent
        - TLS / certificates
        - SCM (Git/Bitbucket)
        - Artifactory
        - Documentation
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What’s painful today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like CDS to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you’ve tried.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope / impact
      description: Any notes about backward compatibility, breaking changes, security, or performance.
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I’m willing to help implement this feature.
          required: false
